name: Python CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
        FRAUD_COMPANIES_LIST: ${{ secrets.FRAUD_COMPANIES_LIST}}
        SKIP_ROLE_NAMES: ${{ secrets.SKIP_ROLES}}

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: pytest
